<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת קליטת עובדים חדשים — אב טיפוס</title>
<style>
:root{
  --header-bg:#D9EFF9;
  --header-text:#195E7B;
  --border-teal:#A9D9EC;
  --primary-btn:#2FA745;
  --primary-btn-hover:#268a39;
  --danger-btn:#C4726A;
  --danger-btn-hover:#b05a52;
  --error:#C63D3D;
  --warning-yellow-bg:#FFF7D6;
  --warning-yellow-border:#EEDC9A;
  --warning-pink-bg:#FDE7EF;
  --warning-pink-border:#F3C6D9;
  --disabled-bg:#F4F6F8;
  --disabled-text:#9AA5B1;
  --text-main:#1F2937;
  --bg-page:#F7F9FA;
  --white:#FFFFFF;
  --shadow:0 2px 10px rgba(25,94,123,0.12);
  --radius:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"Segoe UI","Arial Hebrew","Arial",sans-serif;
  background:var(--bg-page);
  color:var(--text-main);
  direction:rtl;
  text-align:right;
  font-size:15px;
  line-height:1.6;
}
#app{min-height:100vh;display:flex;flex-direction:column;}

/* ===== Top bars ===== */
.topbar{
  background:var(--white);
  border-bottom:1px solid var(--border-teal);
  padding:12px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:var(--shadow);
  position:sticky;top:0;z-index:50;
}
.topbar .brand{font-weight:700;color:var(--header-text);font-size:21px;display:flex;align-items:center;gap:10px;}
.topbar .brand small{font-weight:400;color:#5c7d8c;font-size:12.5px;}
.tabs{display:flex;gap:6px;}
.tab-btn{
  background:none;border:1px solid transparent;padding:9px 16px;border-radius:var(--radius);
  cursor:pointer;font-size:14.5px;color:var(--header-text);font-weight:600;
}
.tab-btn:hover{background:var(--header-bg);}
.tab-btn.active{background:var(--header-text);color:#fff;}
.user-chip{font-size:13px;color:#5c7d8c;background:var(--header-bg);padding:6px 12px;border-radius:20px;}

.employee-topbar{
  background:var(--header-text);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;box-shadow:var(--shadow);
}
.employee-topbar .title{font-weight:700;font-size:17px;}
.employee-topbar .sub{font-size:13px;opacity:.85;}

main{flex:1;padding:26px 32px;max-width:1280px;width:100%;margin:0 auto;}
main.wide{max-width:1480px;}
main.narrow{max-width:980px;}
main.form-narrow{max-width:700px;}

/* ===== Typography ===== */
h1{color:var(--header-text);font-size:22px;margin:0 0 18px;}
h2.section-title{
  background:var(--header-bg);color:var(--header-text);
  padding:11px 18px;border-radius:var(--radius);font-size:16px;margin:26px 0 16px;
  border:1px solid var(--border-teal);
}
h2.section-title:first-child{margin-top:0;}
.page-desc{color:#516170;font-size:13.5px;margin:-10px 0 20px;}

/* ===== Card / panel ===== */
.panel{
  background:var(--white);border:1px solid var(--border-teal);border-radius:var(--radius);
  padding:20px 22px;margin-bottom:18px;
}
.card{
  background:var(--white);border:1px solid var(--border-teal);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:12px;position:relative;
}
.card.disabled{background:var(--disabled-bg);color:var(--disabled-text);}
.card.disabled .hint{color:var(--disabled-text);}
.card-title{font-weight:700;color:var(--text-main);font-size:14.5px;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.card.disabled .card-title{color:#7a8794;}
.card-hint{font-size:12.5px;color:#5c7d8c;margin-top:6px;}
.card.disabled-note{font-size:12.5px;color:#8a94a3;background:#eceff2;border-radius:6px;padding:8px 10px;margin-top:8px;}

/* ===== Forms ===== */
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px 18px;}
.form-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.form-grid.cols-4{grid-template-columns:repeat(4,1fr);}
.form-grid.cols-5{grid-template-columns:repeat(5,1fr);}
/* כשכמה form-grid מוצבים ברצף בתוך אותו panel (למשל כדי לקבץ שדות
   בשורות שונות מספר העמודות ביניהן), יש להוסיף את אותו מרווח שורה
   (16px) שקיים בין שורות בתוך grid יחיד - כדי שהמרווח ייראה זהה בכל
   הטופס, ולא רק שם שבו יש כמה form-grid נפרדים ברצף. */
.panel .form-grid + .form-grid{margin-top:16px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field.span-2{grid-column:span 2;}
.field.span-3{grid-column:span 3;}
.field label{font-size:13.5px;font-weight:700;color:var(--text-main);display:flex;align-items:center;gap:5px;}
.req-star{color:var(--error);font-weight:700;}
input[type=text],input[type=date],input[type=email],input[type=tel],input[type=number],select,textarea{
  border:1px solid #C7D2D9;border-radius:6px;padding:10px 12px;font-size:14.5px;
  font-family:inherit;background:#fff;color:var(--text-main);width:100%;
}
input[type=date]{direction:ltr;text-align:right;padding:10px 6px 10px 12px;}
input[type=date]::-webkit-calendar-picker-indicator{
  margin-inline-start:8px;
  border-inline-start:1px solid #C7D2D9;
  padding:0 8px;
  cursor:pointer;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--header-text);box-shadow:0 0 0 3px rgba(25,94,123,0.12);}
input.err,select.err{border-color:var(--error);background:#FFF6F6;}
input:disabled,select:disabled{background:var(--disabled-bg);color:var(--disabled-text);cursor:not-allowed;}
.field-error{color:var(--error);font-size:12.5px;margin-top:2px;}
.field-hint-static{color:#6b7a86;font-size:12px;margin-top:2px;}
.radio-row,.check-row{display:flex;align-items:center;gap:8px;font-size:14px;}
.radio-group,.check-group{display:flex;flex-wrap:wrap;gap:14px;padding-top:6px;}
.radio-group label,.check-group label{display:flex;align-items:center;gap:6px;font-weight:500;font-size:14px;cursor:pointer;}
input[type=radio],input[type=checkbox]{width:17px;height:17px;accent-color:var(--header-text);cursor:pointer;}

/* ===== Tooltip / help icon ===== */
.qmark{
  display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;
  background:#eaf5fb;color:#1F7AA8;border:1px solid #bfe0ee;font-size:12px;font-weight:700;cursor:pointer;
  flex-shrink:0;
}
.qmark:hover{background:#d7ecf6;}
.tooltip-pop{
  display:none;position:absolute;z-index:80;background:#fff;border:1px solid var(--border-teal);
  border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,0.15);padding:12px 14px;font-size:13px;
  color:var(--text-main);width:340px;max-width:80vw;line-height:1.55;top:100%;right:0;margin-top:6px;
}
.tooltip-pop.open{display:block;}
.tooltip-wrap{position:relative;display:inline-flex;}

/* ===== Alerts ===== */
.alert{border-radius:var(--radius);padding:13px 16px;font-size:13.5px;margin:10px 0;line-height:1.6;}
.alert-warning-yellow{background:var(--warning-yellow-bg);border:1px solid var(--warning-yellow-border);color:#6b5a12;}
.alert-warning-pink{background:var(--warning-pink-bg);border:1px solid var(--warning-pink-border);color:#8a2451;}
.alert-error{background:#FDEEEE;border:1px solid #F3C2C2;color:var(--error);}
.alert-info{background:#EEF7FB;border:1px solid var(--border-teal);color:var(--header-text);}
.alert b{display:block;margin-bottom:4px;}
.alert .alert-actions{display:flex;gap:10px;margin-top:12px;}

/* ===== Buttons ===== */
.btn{border:none;border-radius:6px;padding:11px 20px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-primary{background:var(--primary-btn);color:#fff;}
.btn-primary:hover{background:var(--primary-btn-hover);}
.btn-secondary{background:#fff;color:var(--header-text);border:1px solid var(--border-teal);}
.btn-secondary:hover{background:var(--header-bg);}
.btn-danger{background:var(--danger-btn);color:#fff;}
.btn-danger:hover{background:var(--danger-btn-hover);}
.btn-disabled,.btn:disabled{background:var(--disabled-bg)!important;color:var(--disabled-text)!important;cursor:not-allowed;}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-link{background:none;border:none;color:var(--header-text);cursor:pointer;font-size:13.5px;text-decoration:underline;padding:0;font-weight:600;}
.btn-icon-danger{background-color:#D9534F;border:0.8px solid #D43F3A;color:#fff;width:21.6px;height:21.6px;padding:1px;border-radius:3px;font-size:13px;font-weight:700;cursor:pointer;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.btn-icon-danger:hover{background-color:#c9302c;}
.btn-add-green{background:var(--primary-btn);color:#fff;border:none;border-radius:6px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-row{display:flex;gap:10px;margin-top:22px;justify-content:flex-start;}

/* ===== Table ===== */
.table-wrap{overflow-x:auto;border:1px solid var(--border-teal);border-radius:var(--radius);}
/* #hrListTableWrap: קונטיינר יחיד לכל הטבלה (כולל שורת הכותרות), עם גובה
   מקסימלי קבוע שמתאים לגובה המסך הנראה (viewport) מתחת לכל מה שמופיע מעליו
   בעמוד (תפריט עליון + כותרת + שורת כפתורים + סרגל סינונים). 300px הוא אומדן
   של סך גובהם (ניתן לכייל אם הפריסה מעליהם משתנה). לקונטיינר הזה יש גם
   overflow-y:auto (גלילה אנכית של השורות) וגם overflow-x:auto (גלילה אופקית -
   פס גלילה טבעי (native) יחיד, בלי אלמנט מדומה נוסף וללא סנכרון ב-JS). מכיוון
   שהקונטיינר לעולם לא גדל מעבר לגובה הזה, שני פסי הגלילה הטבעיים שלו נשארים
   תמיד בתוך אזור הנראה למשתמש. שורת הכותרות (table.data-table th) מוגדרת
   position:sticky;top:0 ונדבקת לראש הקונטיינר הזה עצמו תוך כדי גלילת השורות. */
#hrListTableWrap{max-height:calc(100vh - 300px);overflow-y:auto;overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:13.5px;background:#fff;}
table.data-table th{background:var(--header-bg);color:var(--header-text);padding:10px 12px;text-align:right;font-weight:700;white-space:nowrap;border-bottom:1px solid var(--border-teal);position:sticky;top:0;}
table.data-table td{padding:9px 12px;border-bottom:1px solid #eef2f4;white-space:nowrap;}
/* פסים לסירוגין (zebra striping) - כבוי כרגע לפי בקשת המשתמשת, אך
   נשמר בקוד (כהערה) למקרה שירצו להחזיר אותו בעתיד. חל רק בטבלאות מסך
   "הגדרות מערכת" (חברות, אתרי עבודה, טבלאות קוד נוספות) - ר' מחלקת
   zebra-table שמתווספת לטבלאות האלה בלבד (המחלקה נשארת בקוד ה-HTML
   גם כשהכלל הזה כבוי - היא פשוט לא עושה כלום בלעדיו).
table.zebra-table tbody tr:nth-child(even) td{background:#DCE6EA!important;}
*/
/* כפתורי אייקון עריכה/מחיקה בטבלאות - באותו צבע כמו טקסט השורה כברירת
   מחדל, וצבע שונה רק במעבר עכבר (hover). */
.row-icon-btn{border:none;background:none;padding:2px;cursor:pointer;color:var(--text-main);display:inline-flex;align-items:center;}
.row-icon-btn.edit:hover{color:var(--header-text);}
.row-icon-btn.delete:hover{color:var(--error);}
/* הדגשת שורה בריחוף עכבר (hover) - רקע אפור בהיר, זמנית ונעלמת כשהעכבר
   עוזב את השורה. table.data-table משמש אך ורק במסכי ניהול עובדים,
   הגדרות מערכת, יצוא טפסים והיסטוריית טפסים - כך שהכלל הזה כבר ממילא
   מוגבל למסכים האלה בלבד ולא משפיע על הטופס או עמודים אחרים. */
table.data-table tr:hover td{background:#E7E7E7;}
.status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
.pill-gray{background:#EEF1F3;color:#5b6b77;}
.pill-yellow{background:#FFF3CC;color:#8a6d00;}
.pill-green{background:#DEF3E3;color:#1f7a3d;}
.pill-red{background:#FBE1E1;color:#a72e2e;}
.pill-blue{background:#DCEEF7;color:#195E7B;}

/* ===== Filters bar ===== */
.filters-bar{background:#fff;border:1px solid var(--border-teal);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:end;}
.filters-bar .field{min-width:150px;}
.filters-bar .field label{font-size:12px;color:#5c7d8c;}

/* ===== Anchor nav for form 101 ===== */
.anchor-nav{
  position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border-teal);z-index:40;
  padding:10px 28px;display:flex;gap:4px;flex-wrap:wrap;box-shadow:var(--shadow);
}
.anchor-nav a{color:var(--header-text);text-decoration:none;font-size:12.8px;font-weight:600;padding:6px 10px;border-radius:6px;}
.anchor-nav a:hover{background:var(--header-bg);}

/* ===== מסך "טבלאות קוד" (הגדרות מערכת) =====
   סרגל עליון קבוע (position:sticky) עם בחירת מערכת יעד (שיקלולית/כחולה)
   ורשימת קישורי עוגן לכל שדה - כדי לאפשר קפיצה ישירה לשדה מתוך טבלה
   ארוכה אחת (ולא טאבים אופקיים, שאינם מתאימים כשיש הרבה שדות). */
.code-sys-bar{
  position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border-teal);z-index:40;
  padding:10px 0 8px;box-shadow:var(--shadow);
}
/* טבלה אחת רציפה לכל השדות המקודדים - כותרת "ערך"/"קוד" מופיעה פעם
   אחת בלבד (ולא לכל שדה בנפרד). ברירת המחדל של table.data-table היא
   width:100%, אבל כאן יש רק שתי עמודות ורוצים שהעמודות יהיו צמודות
   זו לזו ולא פרושות על פני כל רוחב המסך. */
table.code-table{width:auto;min-width:280px;}
table.code-table td:last-child, table.code-table th:last-child{width:90px;}
.code-group-row{background:var(--header-bg);color:var(--header-text);font-weight:700;}
.code-table input.code-input{width:64px;padding:6px 8px;font-size:14px;}

/* ===== misc ===== */
.readonly-box{background:var(--disabled-bg);border:1px solid #E1E6EA;border-radius:6px;padding:10px 12px;font-size:14px;color:#4b5765;}
.divider{border:none;border-top:1px solid #EEF2F4;margin:22px 0;}
.badge-count{background:var(--header-text);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;margin-right:5px;}
.empty-state{text-align:center;padding:50px 20px;color:#8a94a3;}
.kids-list{display:flex;flex-direction:column;gap:10px;}
.kid-card{border:1px solid var(--border-teal);border-radius:var(--radius);padding:14px 16px;background:#fff;}
.kid-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.kid-card-head b{color:var(--header-text);}
.print-frame{background:#fff;box-shadow:0 0 0 1px #ddd, var(--shadow);width:210mm;min-height:297mm;margin:20px auto;padding:14mm 12mm;font-size:11.5px;color:#111;}
.print-toolbar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border-teal);padding:12px 28px;display:flex;justify-content:space-between;align-items:center;z-index:50;}
@media print{
  .no-print{display:none!important;}
  body{background:#fff;}
  .print-frame{box-shadow:none;margin:0;width:auto;min-height:auto;}
}
.modal-overlay{position:fixed;inset:0;background:rgba(20,30,40,0.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-box{background:#fff;border-radius:var(--radius);padding:24px;max-width:480px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.25);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#20303c;color:#fff;padding:13px 22px;border-radius:8px;font-size:14px;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:toastin .2s ease;}
@keyframes toastin{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
/* הדגשה זמנית של שורה שנוספה כרגע לטבלה (למשל חברה חדשה) */
@keyframes rowHighlightFade{from{background:#FFF3B0;}to{background:transparent;}}
table.data-table tr.row-highlight td{animation:rowHighlightFade 2.5s ease-out;}

/* row action menu */
.row-actions{display:flex;gap:6px;align-items:center;}
details.row-menu{position:relative;}
details.row-menu summary{list-style:none;cursor:pointer;width:28px;height:28px;border:1px solid var(--border-teal);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--header-text);background:#fff;}
details.row-menu summary::-webkit-details-marker{display:none;}
details.row-menu[open] summary{background:var(--header-bg);}
.row-menu-list{position:absolute;left:0;top:32px;background:#fff;border:1px solid var(--border-teal);border-radius:8px;box-shadow:var(--shadow);min-width:190px;z-index:60;padding:6px;}
.row-menu-list button{display:block;width:100%;text-align:right;background:none;border:none;padding:8px 10px;font-size:13px;border-radius:6px;cursor:pointer;color:var(--text-main);}
.row-menu-list button:hover{background:var(--header-bg);}
.row-menu-list button.danger{color:var(--danger-btn);}
.row-menu-list hr{border:none;border-top:1px solid #eef2f4;margin:4px 0;}
.btn-icon{width:30px;height:30px;border:1px solid var(--border-teal);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:var(--header-text);}
.btn-icon:hover{background:var(--header-bg);}

/* ===== Combo (רשימה נפתחת עם הקלדה) ===== */
.combo-wrap{position:relative;}
.combo-dropdown{display:none;position:absolute;z-index:70;top:100%;right:0;left:0;margin-top:4px;max-height:260px;overflow-y:auto;background:#fff;border:1px solid var(--border-teal);border-radius:8px;box-shadow:var(--shadow);}
.combo-dropdown.open{display:block;}
.combo-item{padding:9px 12px;font-size:13.5px;color:var(--text-main);text-align:right;cursor:pointer;border-bottom:1px solid #F0F3F5;}
.combo-item:last-child{border-bottom:none;}
.combo-item:hover{background:var(--header-bg);}
.combo-item.active{background:var(--header-text);color:#fff;}
.combo-empty{padding:12px;text-align:center;color:#8a94a3;font-size:13px;}

/* anchor sections nav highlight */
.kv{display:grid;grid-template-columns:150px 1fr;gap:8px 14px;font-size:14px;}
.kv div.k{color:#5c7d8c;font-weight:600;}
.stepper-note{background:var(--header-bg);border:1px solid var(--border-teal);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--header-text);margin-bottom:16px;}
.progress-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.progress-tabs button{background:#fff;border:1px solid var(--border-teal);color:var(--header-text);padding:9px 16px;border-radius:20px;font-size:13.5px;font-weight:600;cursor:pointer;}
.progress-tabs button.active{background:var(--header-text);color:#fff;}
.progress-tabs button .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:6px;}
.dot-green{background:var(--primary-btn);}
.dot-gray{background:#c8d0d6;}
/* ===== צ'ק ליסט 11 הטפסים (כרטיס עובד + טאב מילוי הטפסים) ===== */
.checklist-wrap{background:#fff;border:1px solid var(--border-teal);border-radius:8px;overflow:hidden;margin-bottom:18px;max-width:720px;}
/* grid קבוע (לא flex) כדי שעמודת הסטטוס ועמודת הפעולה יהיו תמיד באותו
   מיקום אופקי בכל השורות, בין אם יש כפתור פעולה בשורה ובין אם לא. */
.checklist-row{display:grid;grid-template-columns:1fr 100px 130px;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #eef2f4;font-size:13.5px;}
.checklist-row:last-child{border-bottom:none;}
.checklist-row:hover{background:#E7E7E7;}
.checklist-status-col{justify-self:start;}
.checklist-action-col{justify-self:start;}
/* כפתור "לצפייה והדפסה" בסגנון קליל התואם ל-badge-ים (פס גבול דק,
   פינות מעוגלות, טקסט קטן) ולא לכפתור btn רגיל שמתחרה איתם ויזואלית. */
.checklist-print-btn{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--border-teal);color:var(--header-text);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.checklist-print-btn:hover{background:var(--header-bg);}

/* ===== מסך "רשימת הטפסים למילוי" (עובד/ת בלבד) =====
   גוון סגול ייחודי לעמוד הזה בלבד, כדי שיהיה ברור מיידית לעובד/ת
   (שיושב/ת מול אותו מחשב כמו משאבי אנוש) שמדובר במסך אחר לגמרי -
   ולא שינוי בעיצוב הכללי של המערכת. ר' emp-welcome-banner/
   emp-progress-card/btn-emp-start, בשימוש רק ב-renderEmployeeChecklist. */
.emp-welcome-banner{background:#EAF1FD;border:1px solid #C9DBFA;border-radius:8px;padding:18px 22px;margin-bottom:18px;max-width:720px;}
.emp-welcome-banner h1{color:#1B3F82;margin:0 0 6px;}
.emp-welcome-banner p{margin:0;color:#3D5A80;font-size:14px;}
.emp-progress-card{background:#EAF1FD;border:1px solid #C9DBFA;}
.btn-emp-start{background:#2F6FED;color:#fff;border:none;}
.btn-emp-start:hover{background:#2557C7;}
.emp-theme .checklist-row .btn{padding:6px 18px;font-size:13px;border-radius:18px;}
/* שאר הרכיבים בעמוד (מסגרת טבלת הטפסים, מסגרת כפתור "עריכה"/כפתור
   מושבת) - כל אלה משתמשים במחלקות משותפות עם כרטיס עובד (HR), ולכן
   הצביעה שלהם לסגול חייבת להיות מוגבלת לתוך .emp-theme בלבד. */
.emp-theme .checklist-wrap{border-color:#C9DBFA;}
.emp-theme .btn-secondary{border-color:#2F6FED;color:#2F6FED;}
.emp-theme .btn-secondary:hover{background:#EAF1FD;}

/* ===== Print form replica ===== */
.print-frame{page-break-after:always;}
.print-frame.last{page-break-after:auto;}
.pf-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #195E7B;padding-bottom:8px;margin-bottom:10px;}
.pf-header .pf-title{font-size:15px;font-weight:800;color:#195E7B;}
.pf-header .pf-sub{font-size:10px;color:#555;}
.pf-section-title{background:#D9EFF9;color:#195E7B;font-weight:800;font-size:11.5px;padding:4px 8px;margin:10px 0 6px;border:1px solid #A9D9EC;}
.pf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #9fb3bd;margin-bottom:2px;}
.pf-grid.c2{grid-template-columns:repeat(2,1fr);}
.pf-grid.c3{grid-template-columns:repeat(3,1fr);}
.pf-cell{border-left:1px solid #9fb3bd;padding:3px 6px;min-height:32px;}
.pf-cell:last-child{border-left:none;}
.pf-cell .pf-lbl{font-size:8.5px;color:#5c6b74;display:block;}
.pf-cell .pf-val{font-size:11px;font-weight:600;color:#111;}
.pf-check-list{display:flex;flex-direction:column;gap:1px;}
.pf-check-item{display:flex;gap:6px;align-items:flex-start;font-size:10px;padding:2px 4px;border-bottom:1px dotted #ccd6db;}
.pf-check-item .box{width:11px;height:11px;border:1px solid #333;flex-shrink:0;margin-top:1px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;}
.pf-sig-row{display:flex;justify-content:space-between;margin-top:26px;}
.pf-sig-box{width:45%;border-top:1px solid #333;padding-top:4px;font-size:10px;text-align:center;color:#555;}
.pf-note{font-size:9px;color:#666;margin-top:6px;line-height:1.4;}
.pf-kids-table{width:100%;border-collapse:collapse;font-size:9.5px;margin-top:4px;}
.pf-kids-table th,.pf-kids-table td{border:1px solid #9fb3bd;padding:3px 5px;text-align:center;}
.pf-kids-table th{background:#EEF6FA;}
</style>

  {key:"terms", label:"פירוט תנאי עבודה", kind:"generic"},
  {key:"form101", label:"טופס 101", kind:"form101"},

];
function defaultFormSelection(){
  const sel = {};
  FORM_CHECKLIST_DEFS.forEach(d=>{ sel[d.key] = true; });
  return sel;
}
function defaultChecklistState(){
  const st = {};
  FORM_CHECKLIST_DEFS.forEach(d=>{ if(d.kind==="generic") st[d.key] = false; });
  return st;
}
/* מחזירה רק את הטפסים שסומנו כרלוונטיים לתיק הזה (formSelection), עם
   שדה completed מחושב - ר' הערה למעלה על מקור הסטטוס לכל kind. */
function relevantChecklistItems(c){
  return FORM_CHECKLIST_DEFS.filter(def=>c.formSelection && c.formSelection[def.key]).map(def=>{
    let completed;
    if(def.kind==="form101") completed = c.employee.form101Status==="completed";
    else if(def.kind==="bank") completed = c.bank.status==="completed";
    else completed = !!(c.checklist && c.checklist[def.key]);
    return Object.assign({completed:completed}, def);
  });
}
function checklistProgress(c){
  const items = relevantChecklistItems(c);
  return {done: items.filter(i=>i.completed).length, total: items.length};
}
/* באדג' "טפסים חסרים" לרשימת תיקי הקליטה (HR): ירוק כשהכול הושלם,
   כתום כשחסרים מעטים (1-3), אדום כשחסרים הרבה (4+). */
function missingFormsInfo(c){
  const p = checklistProgress(c);
  const missing = p.total - p.done;
  if(missing<=0) return {text:"הושלם", cls:"pill-green"};
  if(missing<=3) return {text:missing+" חסרים", cls:"pill-yellow"};
  return {text:missing+" חסרים", cls:"pill-red"};
}

/* שירות הבנקים/סניפים - הרכיב היחיד שרכיבי ה-UI (טופס הבנק) רשאים
   לפנות אליו. בפיתוח האמיתי מומש מחדש מול בסיס הנתונים בלי לשנות
   את הטופס עצמו, כי הוא פונה רק לפונקציות האלו.

   סניפים עם שמות כלליים, כפולים או חריגים (למשל כמה סניפים עם אותו שם
   באותו בנק, או שם סניף שהוא בעצמו קוד): אין לסנן, לאחד או לשנות את
   הנתונים מהקובץ הרשמי בשלב זה - listBanks/listBranches מחזירות את כל
   הרשומות כלשונן. בכל תצוגה (רשימה נפתחת, טופס, הדפסה) יש להציג תמיד
   גם את שם הסניף וגם את קוד הסניף יחד, כאשר הקוד הוא המזהה הקובע. */
const BankBranchesService = {
  listBanks(query){
    const q = (query||"").trim();
    let list = Object.keys(BANK_BRANCHES_DATA).map(code=>({code:code,name:BANK_BRANCHES_DATA[code].n}));
    list.sort((a,b)=>a.name.localeCompare(b.name,"he"));
    if(q) list = list.filter(x=>x.name.indexOf(q)>-1 || x.code.indexOf(q)>-1);
    return list;
  },
  listBranches(bankCode, query){
    const bank = BANK_BRANCHES_DATA[bankCode];
    if(!bank) return [];
    let list = bank.b.map(br=>({code:br[0],name:br[1]}));
    list.sort((a,b)=>a.name.localeCompare(b.name,"he"));
    const q = (query||"").trim();
    if(q) list = list.filter(x=>x.name.indexOf(q)>-1 || x.code.indexOf(q)>-1);
    return list;
  },
  getBankName(code){ const bank = BANK_BRANCHES_DATA[code]; return bank?bank.n:""; },
  getBranchName(bankCode,branchCode){
    const bank = BANK_BRANCHES_DATA[bankCode];
    if(!bank) return "";
    const br = bank.b.find(x=>x[0]===branchCode);
    return br?br[1]:"";
  }
};

function buildDocuments(caseObj){
  // בונה רשימת מסמכים דינמית לפי תשובות העובד
  const emp = caseObj.employee;
  const docs = [];
  if(emp.idType === "id"){
    docs.push({key:"id_copy",label:"צילום תעודת זהות וספח",status:"missing"});
  } else {
    docs.push({key:"passport_copy",label:"צילום דרכון ואישור/רישיון שהייה",status:"missing"});
  }
  docs.push({key:"form101_signed",label:"טופס 101 חתום",status: emp.form101Status==="completed" ? "missing" : "missing"});
  if(caseObj.needsBankForm){
    docs.push({key:"bank_form_signed",label:"טופס פרטי חשבון בנק חתום",status:"missing"});
  }
  const tc = emp.taxCredits;
  TAX_CREDIT_META.forEach(meta=>{
    if(!meta.document) return;
    const val = tc[meta.key];
    const checked = (typeof val === "object") ? val.checked : val;
    if(checked){
      docs.push({key:"doc_"+meta.key,label:meta.document + " (סעיף "+meta.num+")",status:"missing"});
    }
  });
  if(emp.taxCoordination && emp.taxCoordination.option==="hasOtherIncome" && emp.taxCoordination.sources.length){
    docs.push({key:"doc_taxcoord_slip",label:"תלוש שכר או אסמכתא רלוונטית (הכנסות נוספות)",status:"missing"});
  }
  if(emp.taxCoordination && emp.taxCoordination.option==="approved"){
    docs.push({key:"doc_taxcoord_approval",label:"אישור תיאום מס מפקיד השומה",status:"missing"});
  }
  return docs;
}

/* ============================================================
   שמירה מתמשכת (localStorage) — כדי שנתוני התיקים ישרדו רענון דף,
   ויהיו משותפים בין הטאב של משאבי אנוש לטאב הנפרד שנפתח לעובד/ת
   למילוי טופס 101 (ראו openEmployeeFillTab).
   ============================================================ */
const DB_STORAGE_KEY = "hr_onboarding_app_db_v1";
/* קידוד הקודים (שיקלולית/מערכת כחולה) של שדות טבלת הקוד (ר' CODED_FIELDS) -
   רק {id, shikulitCode, blueCode} לכל ערך, כדי לא לשמור עותק כפול של כל
   הרשומה (שם, tooltip וכו') שממילא מוגדרים בקוד עצמו. */
function collectCodedFieldsSnapshot(){
  const out = {};
  CODED_FIELDS.forEach(f=>{
    out[f.key] = CODE_TABLES[f.key].map(item=>({id:item.id, shikulitCode:item.shikulitCode||"", blueCode:item.blueCode||""}));
  });
  return out;
}
function applyCodedFieldsSnapshot(snapshot){
  if(!snapshot) return;
  CODED_FIELDS.forEach(f=>{
    const saved = snapshot[f.key];
    if(!saved) return;
    saved.forEach(s=>{
      const item = CODE_TABLES[f.key].find(x=>x.id===s.id);
      if(item){ item.shikulitCode = s.shikulitCode||""; item.blueCode = s.blueCode||""; }
    });
  });
}
function saveDB(){
  try{
    localStorage.setItem(DB_STORAGE_KEY, JSON.stringify({cases:DB.cases,batches:DB.batches,currentUser:DB.currentUser,companies:CODE_TABLES.companies,worksites:CODE_TABLES.worksites,codedFields:collectCodedFieldsSnapshot()}));
  }catch(e){ /* אם localStorage חסום (למשל דפדפן בפרטיות מלאה) - ממשיכים בלי שמירה */ }
}
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_STORAGE_KEY);
    if(!raw) return false;
    const parsed = JSON.parse(raw);
    DB.cases = parsed.cases||[];
    DB.batches = parsed.batches||[];
    if(parsed.currentUser) DB.currentUser = parsed.currentUser;
    if(parsed.companies) CODE_TABLES.companies = parsed.companies;
    if(parsed.worksites) CODE_TABLES.worksites = parsed.worksites;
    applyCodedFieldsSnapshot(parsed.codedFields);
    DB.cases.forEach(migrateCaseTaxCredits);
    DB.cases.forEach(migrateCaseChecklist);
    return true;
  }catch(e){ return false; }
}
/* מיגרציה: תיקים שנשמרו לפני שנוסף צ'ק ליסט 11 הטפסים לא מחזיקים בכלל
   formSelection/checklist, או שנשמרו כשהרשימה הכילה פחות טפסים ממה
   שקיים כרגע ב-FORM_CHECKLIST_DEFS. משלימים ברירת מחדל (רלוונטי/לא
   הושלם) כדי שהתיק הישן ימשיך לעבוד עם המסכים החדשים בלי לאבד מידע. */
function migrateCaseChecklist(caseObj){
  if(!caseObj) return;
  if(!caseObj.formSelection){
    caseObj.formSelection = Object.assign(defaultFormSelection(), {form101:!!caseObj.needsForm101, bank:!!caseObj.needsBankForm});
  } else {
    FORM_CHECKLIST_DEFS.forEach(d=>{ if(!(d.key in caseObj.formSelection)) caseObj.formSelection[d.key]=true; });
  }
  if(!caseObj.checklist) caseObj.checklist = defaultChecklistState();
  else FORM_CHECKLIST_DEFS.forEach(d=>{ if(d.kind==="generic" && !(d.key in caseObj.checklist)) caseObj.checklist[d.key]=false; });
  if(!caseObj.checklistData) caseObj.checklistData = {};
  if(!caseObj.checklistData.emailAccess) caseObj.checklistData.emailAccess = {date:""};
}
/* מיגרציה: תיקים שנשמרו לפני שסעיף 4 (עולה חדש/ה) קיבל שדות תאריך
   נוספים החזיקו בו ערך בוליאני (true/false) בלבד. יש להמיר אותו למבנה
   אובייקט {checked,fromDate,noIncomeUntilDate} כדי שלא "ייתקע" מסומן
   כלא מסומן ולא ניתן לשינוי. */
function migrateCaseTaxCredits(caseObj){
  const tc = caseObj && caseObj.employee && caseObj.employee.taxCredits;
  if(!tc) return;
  if(typeof tc.c4 !== "object" || tc.c4===null){
    tc.c4 = {checked: !!tc.c4, fromDate:"", noIncomeUntilDate:""};
  }
  if(typeof tc.c7 !== "object" || tc.c7===null){
    tc.c7 = {checked: !!tc.c7, bornThisYear:"", age1to2:"", age3:"", age4to5:"", age6to17:"", age18:""};
  }
  if(typeof tc.c8 !== "object" || tc.c8===null){
    tc.c8 = {checked: !!tc.c8, bornThisYear:"", age1to2:"", age3:"", age4to5:"", age6to17:""};
  }
}

/* לאחר טעינת נתונים שמורים מ-localStorage, יש לוודא ש-SEQ (מונה
   המזהים החדשים) ממשיך מהמספר הגבוה ביותר שכבר קיים בנתונים -
   אחרת SEQ מתחיל תמיד מ-1000 מחדש בכל טעינת דף, ומזהה של תיק חדש
   (case1000) מתנגש עם המזהה של תיק הדוגמה הראשון (נועה), וגורם
   ל-getCase להחזיר בטעות את התיק הישן במקום את התיק החדש. */
function restoreSeqFromDB(){
  let maxNum = SEQ - 1;
  function scan(val){
    if(val==null) return;
    if(typeof val === "string"){
      const m = val.match(/^[a-zA-Z]+(\d+)$/);
      if(m){
        const n = parseInt(m[1],10);
        if(n > maxNum) maxNum = n;
      }
    } else if(Array.isArray(val)){
      val.forEach(scan);
    } else if(typeof val === "object"){
      Object.keys(val).forEach(k=>scan(val[k]));
    }
  }
  scan(DB.cases);
  scan(DB.batches);
  SEQ = maxNum + 1;
}
if(!loadDB()){
  seedData();
  saveDB();
} else {
  restoreSeqFromDB();
}

function escapeHtml(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}
function todayIso(){ return new Date().toISOString().slice(0,10); }
function formatDateHe(iso){
  if(!iso) return "";
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d.getTime())) return "";
  return d.getDate().toString().padStart(2,"0")+"/"+(d.getMonth()+1).toString().padStart(2,"0")+"/"+d.getFullYear();
}
function formatDateTimeHe(iso){
  if(!iso) return "";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "";
  return formatDateHe(d.toISOString().slice(0,10))+" "+d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
}
function ageAt(birthIso, atIso){
  const b = new Date(birthIso), a = new Date(atIso||todayIso());
  let age = a.getFullYear()-b.getFullYear();
  const m = a.getMonth()-b.getMonth();
  if(m<0 || (m===0 && a.getDate()<b.getDate())) age--;
  return age;
}
function validIsraeliId(id){
  if(!id) return false;
  id = id.trim();
  if(!/^\d{1,9}$/.test(id)) return false;
  id = id.padStart(9,"0");
  let sum=0;
  for(let i=0;i<9;i++){
    let d = Number(id[i]) * ((i%2===0)?1:2);
    if(d>9) d = Math.floor(d/10)+(d%10);
    sum+=d;
  }
  return sum%10===0;
}
function normalizeIsraeliId(id){
  if(!id) return "";
  return id.trim().padStart(9,"0");
}

/* render() נדחה תמיד לטיק הבא (setTimeout 0). הסיבה: render מחליף את כל
   ה-innerHTML של האפליקציה, כלומר הורס ובונה מחדש את כל אלמנטי ה-DOM,
   כולל את השדה שהיה ממוקד (focused). אם render היה רץ באופן סינכרוני
   מתוך אירוע blur/change של שדה (כפי שקורה כאשר עוברים בין שדות עם
   מקש Tab), הדפדפן "מאבד" את הפוקוס - כי הוא מנסה להעביר את הפוקוס
   לשדה הבא בסדר ה-Tab, אבל האלמנט הישן כבר נהרס, אז הפוקוס נופל
   לגמרי (חוזר ל-body) במקום לעבור לשדה הבא. הדחייה נותנת לדפדפן
   להשלים קודם את מעבר הפוקוס הטבעי שלו, ורק אז אנחנו בונים מחדש את
   ה-DOM - ומיד לאחר מכן משחזרים את הפוקוס לאלמנט (הזהה לפי id) שהיה
   ממוקד באותו רגע, כך שהמעבר בין שדות עם Tab תמיד עובד. */
let renderPending = false;
/* isRerendering: true אך ורק בזמן ההחלפה הפיזית של ה-DOM (app.innerHTML=html)
   בתוך renderNow. הסיבה שהדגל הזה נחוץ: כאשר מחליפים את ה-innerHTML,
   האלמנט הממוקד (למשל שדה קלט שהמשתמש/ת עדיין מקליד/ה בתוכו) נהרס -
   וכשאלמנט ממוקד נהרס/מוסר מה-DOM, הדפדפן יורה עליו אירוע blur אמיתי
   (native), גם בלי שהמשתמש/ת בפועל עזב/ה את השדה! בלי הדגל הזה, כל
   handler שרשום על onblur (בדיקות הולידציה ה"שלמות" - למשל checksum
   של ת"ז, אורך דרכון, פורמט מייל/טלפון מלא) היה רץ בכל הקלדה (כי כל
   הקלדה גורמת ל-render, שגורם ל-blur מלאכותי), במקום רק כשבאמת יוצאים
   מהשדה. ה-handlers של onblur (ר' finalizeEmpField / finalizeCreditField)
   בודקים את הדגל הזה ומדלגים על הרצת הבדיקה אם מדובר ב-blur מלאכותי
   כזה שנגרם מהרינדור עצמו, ולא מפעולה אמיתית של המשתמש/ת. */
let isRerendering = false;
function render(){
  if(renderPending) return;
  renderPending = true;
  setTimeout(function(){
    renderPending = false;
    renderNow();
  }, 0);
}
/* מבטיחה שאין רינדור "תלוי ועומד" (שקבוע לרוץ ב-setTimeout) לפני
   שממשיכים בפעולה - שכבת הגנה נוספת נגד מצב שבו רינדור דחוי קורה
   בדיוק בין mousedown ל-click על כפתור פעולה (כמו "שמור" בחלונות
   ה-Modal), מה שמחליף את ה-DOM ממש ברגע הלחיצה ו"בולע" אותה. */
function flushPendingRender(){
  if(renderPending){
    renderPending = false;
    renderNow();
  }
}
function renderNow(){
  const app = document.getElementById("app");
  const activeEl = document.activeElement;
  const focusId = (activeEl && activeEl.id) ? activeEl.id : null;
  let selStart = null, selEnd = null;
  try{
    if(focusId && "selectionStart" in activeEl){ selStart = activeEl.selectionStart; selEnd = activeEl.selectionEnd; }
  }catch(e){ /* type אינו תומך selection (כגון date/number/checkbox) - מתעלמים */ }
  let html = "";
  try{
    if(ui.screen==="print-form101"){ html = renderPrintForm101(); }
    else if(ui.screen==="print-bank"){ html = renderPrintBank(); }
    else if(ui.screen==="print-form101-bank"){ html = renderPrintCombined(); }
    else if(ui.screen==="print-generic"){ html = renderPrintGeneric(); }
    else if(ui.mode==="employee"){ html = renderEmployeeShell(); }
    else { html = renderHrShell(); }
  }catch(err){
    /* הגנה זמנית לאבחון: אם בניית התוכן נכשלת (שגיאת JS כלשהי),
       לא משאירים את המסך "קפוא" בלי שום הסבר - מציגים הודעת שגיאה
       גלויה על המסך + מדפיסים ל-console, כדי שאפשר יהיה להעתיק
       ולשלוח את השגיאה המדויקת במקום לנחש. */
    console.error("שגיאה בבניית המסך:", err);
    html = '<div style="padding:24px;"><div class="alert alert-warning-pink" style="white-space:pre-wrap;font-family:monospace;text-align:left;direction:ltr;">'+
      'שגיאת JavaScript מנעה את טעינת המסך:\n\n'+escapeHtml(err && err.message ? err.message : String(err))+'\n\n'+escapeHtml(err && err.stack ? err.stack : "")+
      '</div></div>';
  }
  isRerendering = true;
  try{ app.innerHTML = html; } finally { isRerendering = false; }
  const th = document.getElementById("toast-holder");
  if(th) th.innerHTML = ui.toast ? '<div class="toast">'+escapeHtml(ui.toast)+'</div>' : "";
  if(focusId){
    const newEl = document.getElementById(focusId);
    if(newEl){
      newEl.focus();
      if(selStart!==null && selEnd!==null && "setSelectionRange" in newEl){
        try{ newEl.setSelectionRange(selStart, selEnd); }catch(e){ /* type אינו תומך (כגון date/number) - מתעלמים */ }
      }
    }
  }
  saveDB();
  afterRenderHook();
}

    {id:"hr-list",label:"תיקי קליטה"},
    {id:"export",label:"יצוא טפסים"},
    {id:"batches",label:"היסטוריית יצוא"},
    {id:"admin",label:"הגדרות מערכת"}
  ];
  const topScreen = ["hr-list","new-case"].includes(ui.screen) ? "hr-list" : (["export"].includes(ui.screen)?"export":(["batches"].includes(ui.screen)?"batches":(ui.screen==="admin"?"admin":"case")));
  let body = "";
  switch(ui.screen){
    case "hr-list": body = renderHrList(); break;
    case "new-case": body = renderNewCase(); break;
    case "case-home": body = renderCaseHome(); break;
    case "form101": body = renderForm101(true); break;

    case "documents": body = renderDocumentsScreen(); break;
    case "export": body = renderExportScreen(); break;

  '<div class="topbar no-print">' +
    '<div class="brand">מערכת קליטת עובדים חדשים</div>' +
    '<div class="tabs">' +

    '</div>' +

  '<main class="'+(["hr-list","batches","admin"].includes(ui.screen)?"wide":(["new-case","documents"].includes(ui.screen)?"form-narrow":""))+'">' + body + '</main>';
}

function passesFilters(c){
  const f = ui.filters;
  if(f.company && c.companyId!==f.company) return false;
  if(f.worksite && c.worksiteId!==f.worksite) return false;
  if(f.missingDocs){
    const docs = c.documents.length?c.documents:buildDocuments(c);
    if(!docs.some(d=>d.status==="missing")) return false;
  }
  if(f.bankPending && !(c.needsBankForm && c.bank.status!=="completed")) return false;
  if(f.notExported){
    const sk = latestBatchFor(c.id,"shikulit"), bl = latestBatchFor(c.id,"blue");
    if(sk||bl) return false;
  }
  if(f.needsReexport){
    const sk = latestBatchFor(c.id,"shikulit"), bl = latestBatchFor(c.id,"blue");
    const need = (sk&&sk.importStatus==="נדרש יצוא מחדש")||(bl&&bl.importStatus==="נדרש יצוא מחדש");
    if(!need) return false;
  }
  if(f.search){
    const s = f.search.trim();
    const name = (c.employee.firstName+" "+c.employee.lastName).trim();
    const idv = c.employee.idType==="id"?c.employee.idNumber:c.employee.passportNumber;
    if(!name.includes(s) && !(idv||"").includes(s)) return false;
  }
  return true;
}

function renderHrList(){
  const filtered = DB.cases.filter(passesFilters);
  const options = (arr,valKey,labelKey)=>arr.map(x=>'<option value="'+x[valKey]+'">'+escapeHtml(x[labelKey])+'</option>').join("");
  let rows = filtered.map(c=>{
    const emp = c.employee;
    const name = (emp.firstName||emp.lastName) ? (emp.firstName+" "+emp.lastName) : "(טרם הוזן שם)";
    const idv = emp.idType==="id" ? (emp.idNumber||"—") : (emp.passportNumber||"—");
    const docs = docsStatusInfo(c);
    const sk = exportStatusInfo(c,"shikulit"), bl = exportStatusInfo(c,"blue");
    const prog = checklistProgress(c);
    const progPct = prog.total ? Math.round(prog.done/prog.total*100) : 0;
    const missing = missingFormsInfo(c);
    return '<tr ondblclick="if(!event.target.closest(\'.row-actions\')&&!event.target.closest(\'.row-select\')) openCase(\''+c.id+'\',\'case-home\')" style="cursor:pointer;">'+
      '<td class="row-select"><input type="checkbox" '+(ui.hrListSelection.includes(c.id)?"checked":"")+' onchange="toggleHrRowSelect(\''+c.id+'\',this.checked)"></td>'+
      '<td><b>'+escapeHtml(name)+'</b></td>'+
      '<td>'+escapeHtml(idv)+'</td>'+
      '<td>'+escapeHtml(companyName(c.companyId))+'</td>'+
      '<td>'+escapeHtml(worksiteName(c.worksiteId))+'</td>'+
      '<td>'+(emp.form101CompletedAt?formatDateHe(emp.form101CompletedAt.slice(0,10)):"—")+'</td>'+
      '<td><span class="status-pill '+docs.cls+'">'+docs.text+'</span></td>'+
      '<td><div style="display:flex;align-items:center;gap:8px;"><div style="width:60px;background:#EEF1F3;border-radius:20px;height:8px;overflow:hidden;flex-shrink:0;"><div style="width:'+progPct+'%;height:100%;background:#2FA745;"></div></div><span style="font-size:12.5px;color:#5c7d8c;white-space:nowrap;">'+prog.done+'/'+prog.total+'</span></div></td>'+
      '<td><span class="status-pill '+missing.cls+'">'+missing.text+'</span></td>'+
      '<td><span class="status-pill '+sk.cls+'">'+sk.text+'</span></td>'+
      '<td><span class="status-pill '+bl.cls+'">'+bl.text+'</span></td>'+
    '</tr>';
  }).join("");
  if(!filtered.length){
    rows = '<tr><td colspan="11"><div class="empty-state">לא נמצאו תיקי קליטה התואמים את הסינון.</div></td></tr>';
  }
  return '' +
  '<h1>ניהול עובדים — תיקי קליטה</h1>' +
  '<div class="btn-row" style="margin-top:-10px;margin-bottom:18px;">'+
    '<button class="btn btn-primary" onclick="goNewCase()">+ פתח תיק קליטה חדש</button>'+
  '</div>' +
  '<div class="filters-bar">' +
    '<div class="field"><label>חברה</label><select onchange="ui.filters.company=this.value;render()"><option value="">הכל</option>'+options(CODE_TABLES.companies,"id","name")+'</select></div>' +
    '<div class="field"><label>אתר עבודה</label><select onchange="ui.filters.worksite=this.value;render()"><option value="">הכל</option>'+options(CODE_TABLES.worksites,"id","name")+'</select></div>' +
    '<div class="field"><label>חיפוש לפי שם / ת.ז</label><input type="text" value="'+escapeHtml(ui.filters.search)+'" oninput="ui.filters.search=this.value;render()" placeholder="הקלד/י לחיפוש..."></div>' +
    '<div class="field"><label style="visibility:hidden">א</label><label class="check-row"><input type="checkbox" '+(ui.filters.missingDocs?"checked":"")+' onchange="ui.filters.missingDocs=this.checked;render()"> מסמכים חסרים</label></div>' +
    '<div class="field"><label style="visibility:hidden">ב</label><label class="check-row"><input type="checkbox" '+(ui.filters.bankPending?"checked":"")+' onchange="ui.filters.bankPending=this.checked;render()"> טופס בנק ממתין</label></div>' +
    '<div class="field"><label style="visibility:hidden">ג</label><label class="check-row"><input type="checkbox" '+(ui.filters.notExported?"checked":"")+' onchange="ui.filters.notExported=this.checked;render()"> טרם נוצר יצוא</label></div>' +
    '<div class="field"><label style="visibility:hidden">ד</label><label class="check-row"><input type="checkbox" '+(ui.filters.needsReexport?"checked":"")+' onchange="ui.filters.needsReexport=this.checked;render()"> נדרש יצוא מחדש</label></div>' +
    '<div class="field"><button class="btn btn-secondary btn-sm" onclick="resetFilters()">איפוס סינונים</button>'+(ui.hrListSelection.length ? ICON_BTN("trash","מחק תיקים מסומנים ("+ui.hrListSelection.length+")","requestBulkDeleteCases()","delete") : "")+'</div>' +
  '</div>' +
  '<div class="table-wrap" id="hrListTableWrap"><table class="data-table"><thead><tr>'+
    '<th></th><th>שם עובד</th><th>ת.ז/דרכון</th><th>חברה מעסיקה</th><th>אתר עבודה</th>'+
    '<th>ת. השלמת טופס</th><th>סטטוס מסמכים</th><th>התקדמות טפסים</th>'+
    '<th>טפסים חסרים</th><th>יצוא לשיקלולית</th><th>יצוא לכחולה</th>'+
  '</tr></thead><tbody>'+rows+'</tbody></table></div>' +
  renderBulkDeleteCasesModal();
}
function resetFilters(){ ui.filters={company:"",worksite:"",missingDocs:false,bankPending:false,notExported:false,needsReexport:false,search:""}; render(); }
function toggleHrRowSelect(caseId, checked){
  if(checked){
    if(!ui.hrListSelection.includes(caseId)) ui.hrListSelection.push(caseId);
  } else {
    ui.hrListSelection = ui.hrListSelection.filter(id=>id!==caseId);
  }
  render();
}
function requestBulkDeleteCases(){
  if(!ui.hrListSelection.length) return;
  ui.hrBulkDeleteConfirmOpen = true;
  render();
}
function cancelBulkDeleteCases(){
  ui.hrBulkDeleteConfirmOpen = false;
  render();
}
function confirmBulkDeleteCases(){
  const ids = ui.hrListSelection.slice();
  DB.cases = DB.cases.filter(c=>!ids.includes(c.id));
  ui.hrListSelection = [];
  ui.hrBulkDeleteConfirmOpen = false;
  showToast(ids.length===1 ? "תיק הקליטה נמחק בהצלחה." : ids.length+" תיקי קליטה נמחקו בהצלחה.");
  render();
}
function renderBulkDeleteCasesModal(){
  if(!ui.hrBulkDeleteConfirmOpen) return "";
  const n = ui.hrListSelection.length;
  if(!n) return "";
  return '<div class="modal-overlay" onclick="if(event.target===this) cancelBulkDeleteCases()"><div class="modal-box" style="max-width:480px;">' +
    '<h1 style="margin:0 0 14px;">מחיקת תיקי קליטה</h1>' +
    '<div style="margin-bottom:18px;">האם למחוק את '+(n===1?"תיק הקליטה המסומן":n+" תיקי הקליטה המסומנים")+'? <b>לאחר המחיקה לא ניתן יהיה לשחזר את הטפסים והנתונים שהוזנו.</b></div>' +
    '<div class="btn-row"><button class="btn btn-danger" onclick="confirmBulkDeleteCases()">מחק</button><button class="btn btn-secondary" onclick="cancelBulkDeleteCases()">ביטול</button></div>' +
  '</div></div>';
}

/* פותח טאב דפדפן נפרד לגמרי עבור העובד/ת, ללא שום גישה למסכי משאבי
   אנוש (בדומה לקישור אישי שיישלח לעובד/ת במערכת הסופית). התיק מזוהה
   בכתובת הטאב (employeeCase=<מזהה>), והנתונים משותפים בין הטאבים דרך
   localStorage (ר' saveDB/loadDB) - כך שהעובד/ת יכול/ה למלא, לשמור,
   לסגור את החלון ולחזור מאוחר יותר לאותו קישור בלי לאבד מידע. */
function openEmployeeFillTab(caseId, screen){
  saveDB();
  const base = location.href.split("?")[0].split("#")[0];
  const url = base + "?employeeCase=" + encodeURIComponent(caseId) + "&screen=" + encodeURIComponent(screen||"checklist");
  const win = window.open(url, "_blank");
  if(!win){ showToast("חוסם חלונות קופצים מנע פתיחת טאב נפרד. יש לאשר חלונות קופצים לעמוד זה ולנסות שוב."); }
}
function printForm(caseId,type){
  ui.currentCaseId = caseId;
  const c = getCase(caseId);
  if(c) c.lastPrintAt = new Date().toISOString();
  const screenMap = {"form101":"print-form101","bank":"print-bank","form101-bank":"print-form101-bank"};
  setScreen(screenMap[type] || "print-bank");
}

function goNewCase(){
  ui.newCaseDraft = {taxYear:2026, companyId:"", worksiteId:"", startDate:"", formLanguage:"he", formSelection: defaultFormSelection(),
    firstName:"", lastName:"", idType:"id", idNumber:"", passportNumber:""};
  ui.newCaseErrors = {};
  setScreen("new-case");
}
function updateNewCaseDraft(field,value){
  ui.newCaseDraft[field]=value;
  if(field==="companyId") ui.newCaseDraft.worksiteId="";
  render();
}
function updateNewCaseFormSelection(key,checked){
  ui.newCaseDraft.formSelection[key] = checked;
  render();
}
function validateNewCase(){
  const d = ui.newCaseDraft, errs={};
  if(!d.taxYear) errs.taxYear="שדה חובה.";
  if(!d.companyId) errs.companyId="שדה חובה.";
  if(!d.worksiteId) errs.worksiteId="שדה חובה.";
  if(!d.formLanguage) errs.formLanguage="שדה חובה.";
  if(!d.firstName||!d.firstName.trim()) errs.firstName="שדה חובה.";
  if(!d.lastName||!d.lastName.trim()) errs.lastName="שדה חובה.";
  if(!d.idType) errs.idType="שדה חובה.";
  else if(d.idType==="id"){
    if(!d.idNumber) errs.idNumber="שדה חובה.";
    else if(!validIsraeliId(d.idNumber)) errs.idNumber="מספר זהות אינו תקין (בדיקת ספרת ביקורת נכשלה).";
  } else if(d.idType==="passport"){
    if(!d.passportNumber) errs.idNumber="שדה חובה.";
    else if(!/^[A-Za-z0-9]{3,20}$/.test(d.passportNumber)) errs.idNumber="יש להזין 3 עד 20 אותיות ו/או ספרות בלבד.";
  }
  ui.newCaseErrors = errs;
  return Object.keys(errs).length===0;
}
function submitNewCase(){
  if(!validateNewCase()){ render(); return; }
  const d = ui.newCaseDraft;
  const c = emptyCase();
  c.taxYear=Number(d.taxYear); c.companyId=d.companyId; c.worksiteId=d.worksiteId;
  c.startDate=d.startDate; c.formLanguage=d.formLanguage;
  c.formSelection = Object.assign({}, d.formSelection);
  c.needsForm101 = !!c.formSelection.form101;
  c.needsBankForm = !!c.formSelection.bank;
  // פרטי הזיהוי (שם, סוג זיהוי, מספר זהות/דרכון) נמסרים כאן בעת פתיחת
  // התיק - זהו מקור האמת היחיד להם בכל התיק. גם טופס 101 וגם טופס פרטי
  // חשבון הבנק מציגים אותם בהמשך כשדות לקריאה בלבד, ולא מאפשרים עריכה.
  c.employee.firstName = (d.firstName||"").trim();
  c.employee.lastName = (d.lastName||"").trim();
  c.employee.idType = d.idType;
  c.employee.idNumber = d.idType==="id" ? (d.idNumber||"").trim() : "";
  c.employee.passportNumber = d.idType==="passport" ? (d.passportNumber||"").trim() : "";
  c.documents = buildDocuments(c);
  DB.cases.push(c);
  showToast("תיק הקליטה נפתח בהצלחה.");
  // טאב מילוי הטפסים נפתח עבור העובד/ת בטאב נפרד לגמרי (ר' openEmployeeFillTab) -
  // כך שלעובד/ת אין גישה למסכי משאבי אנוש, וטאב משאבי אנוש הזה נשאר
  // על מסך התיק ויכול לשמש למעקב אחר ההתקדמות. נפתח ישירות לרשימת
  // הטפסים (checklist), כל עוד נבחר לפחות טופס אחד רלוונטי לעובד/ת.
  if(Object.keys(c.formSelection).some(k=>c.formSelection[k])){
    openEmployeeFillTab(c.id,"checklist");
  }
  openCase(c.id,"case-home");
}

    '<div class="btn-row">' +
      '<button class="btn btn-primary" onclick="submitNewCase()">התחל מילוי טפסים</button>' +
      '<button class="btn btn-secondary" style="margin-right:16px;" onclick="backToList()">ביטול וחזרה לרשימה</button>' +
    '</div>' +
  '</div>';
}

/* ============================================================
   9-א. פונקציות עזר גנריות לעדכון שדות ולסימני שאלה
   ============================================================ */
let TOOLTIP_SEQ = 1;
function qmarkHtml(text){
  const id = "tt"+(TOOLTIP_SEQ++);
  /* event.preventDefault()+stopPropagation(): כשה-qmark יושב בתוך <label for="...">
     (כמו ב-f101FieldWrap), קליק עליו "מדליף" קליק אוטומטי גם לשדה הקלט המקושר
     (התנהגות ברירת מחדל של label). הקליק המדולף הזה בועה עד ל-document ומפעיל
     את הלוגיקה שסוגרת tooltip פתוח (כי מקורו מחוץ ל-.tooltip-wrap), כך
     שה-tooltip נסגר מיד אחרי שנפתח ונדמה כאילו אין לו תוכן בכלל. מניעת
     ברירת המחדל של הקליק מבטלת את ההדלפה הזו. */
  return '<span class="tooltip-wrap">'+
    '<span class="qmark" onclick="event.preventDefault();event.stopPropagation();toggleTooltip(\''+id+'\')">?</span>'+
    '<div class="tooltip-pop" id="'+id+'">'+text+'</div>'+
  '</span>';
}
function toggleTooltip(id){
  document.querySelectorAll(".tooltip-pop.open").forEach(el=>{ if(el.id!==id) el.classList.remove("open"); });
  const el = document.getElementById(id);
  if(el) el.classList.toggle("open");
}
document.addEventListener("click",function(e){
  if(!e.target.closest(".tooltip-wrap")){
    document.querySelectorAll(".tooltip-pop.open").forEach(el=>el.classList.remove("open"));
  }
});
function setPath(obj,path,value){
  const parts = path.split(".");
  let cur = obj;
  for(let i=0;i<parts.length-1;i++){ cur = cur[parts[i]]; }
  cur[parts[parts.length-1]] = value;
}
function getPath(obj,path){
  return path.split(".").reduce((o,k)=> (o===undefined||o===null)?undefined:o[k], obj);
}
/* ממפה path של מודל הנתונים (למשל "children.0.name") למזהה הודעת
   השגיאה המתאים כפי שנקבע ב-validateForm101 (למשל "f101_kid_0_name") -
   כדי שאפשר יהיה למחוק את השגיאה ברגע שהשדה מתוקן. */
function errorKeyForPath(path){
  let m;
  if((m = path.match(/^children\.(\d+)\.(.+)$/))) return "f101_kid_"+m[1]+"_"+m[2];
  if((m = path.match(/^taxCoordination\.sources\.(\d+)\.(.+)$/))) return "f101_ts_"+m[1]+"_"+m[2];
  return "f101_"+path.replace(/\./g,"_");
}
/* ============================================================
   ולידציית תוכן: הפרדה בין שני תזמונים (לא נוגעת בבדיקות "שדה חובה",
   שרצות רק בשליחה, ולא באות הבדיקות עצמן):
   1. liveFormatError - בדיקת מבנה/פורמט של מה שהוקלד עד כה בלבד
      (למשל: "רק ספרות מותרות") - רצה תוך כדי הקלדה (oninput).
   2. finalFieldError - הבדיקה המלאה הקיימת (שלמות/היגיון הערך הסופי,
      כגון אורך מדויק, ספרת ביקורת, טווח, השוואה בין שדות) - זהה
      לחלוטין לבדיקה שהייתה קיימת, רק שרצה כעת אך ורק ב-blur (יציאה
      מהשדה) או בשליחת הטופס (validateForm101), ולא תוך כדי הקלדה.
   ============================================================ */
function liveFormatError(path, value){
  if(path==="idNumber" || path==="spouse.idNumber" || /^children\.\d+\.idNumber$/.test(path)){
    if(value && !/^\d*$/.test(value)) return "יש להזין ספרות בלבד.";
    return null;
  }
  if(path==="passportNumber"){
    if(value && !/^[A-Za-z0-9]*$/.test(value)) return "יש להזין אותיות ו/או ספרות בלבד.";
    return null;
  }
  if(path==="email"){
    if(value && /\s/.test(value)) return "כתובת דוא\"ל אינה יכולה להכיל רווחים.";
    return null;
  }
  if(path==="mobilePhone" || path==="phone2"){
    if(value && !/^\d*$/.test(value)) return "מספר טלפון יכול להכיל ספרות בלבד.";
    return null;
  }
  return null; // אין כלל פורמט חי לשדה זה (למשל תאריך/מספר) - הבדיקה המלאה רצה רק ב-blur
}
function finalFieldError(path, value, emp){
  let m;
  if(path==="idNumber"){
    if(emp.idType==="id" && value && !validIsraeliId(value)) return "מספר זהות אינו תקין (בדיקת ספרת ביקורת נכשלה).";
    return null;
  }
  if(path==="passportNumber"){
    if(emp.idType==="passport" && value && !/^[A-Za-z0-9]{3,20}$/.test(value)) return "יש להזין 3 עד 20 אותיות ו/או ספרות בלבד.";
    return null;
  }
  if(path==="birthDate"){
    if(value && value>todayIso()) return "תאריך לידה אינו יכול להיות עתידי.";
    return null;
  }
  if(path==="email"){
    if(value && !validEmail(value)) return "כתובת דוא\"ל אינה תקינה.";
    return null;
  }
  if(path==="mobilePhone" || path==="phone2"){
    const p1ok = emp.mobilePhone && validPhone(emp.mobilePhone);
    const p2ok = emp.phone2 && validPhone(emp.phone2);
    if((emp.mobilePhone||emp.phone2) && !p1ok && !p2ok) return "יש למלא לפחות מספר טלפון אחד תקין (לדוגמה: 050-1234567).";
    return null;
  }
  if(path==="spouse.idNumber"){
    if(emp.spouse.idType==="id" && value && !validIsraeliId(value)) return "מספר זהות אינו תקין.";
    return null;
  }
  if((m = path.match(/^children\.(\d+)\.idNumber$/))){
    if(value && !validIsraeliId(value)) return "מספר זהות אינו תקין.";
    return null;
  }
  return null; // לשדה זה אין בדיקת תוכן - רק בדיקת "שדה חובה" שנשארת לשליחה
}
/* רץ תוך כדי הקלדה (oninput): מעדכן את הערך ומריץ רק את בדיקת הפורמט
   החיה. אינו מריץ את הבדיקה המלאה - כך שהודעת שגיאה על שלמות/היגיון
   הערך (אם הייתה קיימת מ-blur קודם) נמחקת מיד כשמתחילים לערוך מחדש,
   ותופיע שוב רק אחרי היציאה הבאה מהשדה. */
function updateEmp(path,value){
  const c = currentCase();
  setPath(c.employee, path, value);
  const errKey = (path==="phone2") ? "f101_mobilePhone" : errorKeyForPath(path);
  const fmtErr = liveFormatError(path, value);
  if(fmtErr) ui.errors[errKey] = fmtErr;
  else delete ui.errors[errKey];
  render();
}
/* רץ ביציאה מהשדה (onblur): מריץ את הבדיקה המלאה הקיימת (ללא שינוי
   בכללים עצמם), בדיוק כפי שהיא תרוץ גם בשליחת הטופס. */
function finalizeEmpField(path,value){
  if(isRerendering) return; // blur מלאכותי שנגרם מהרינדור עצמו (ר' isRerendering) - לא פעולת יציאה אמיתית
  const c = currentCase();
  setPath(c.employee, path, value);
  const errKey = (path==="phone2") ? "f101_mobilePhone" : errorKeyForPath(path);
  const err = finalFieldError(path, value, c.employee);
  if(err) ui.errors[errKey] = err;
  else delete ui.errors[errKey];
  render();
}
/* תאריך תחילת עבודה בשנת המס - שדה ברמת התיק (c.startDate, לא emp),
   לכן לא עובר דרך updateEmp. יורש ערך מ"פתיחת תיק קליטה חדש" אם הוזן
   שם, אך ניתן לשינוי כאן וגם חובה למלא אותו כאן (שדה חובה בטופס 101),
   גם אם משאבי אנוש לא מילאו אותו מראש. */
function updateCaseStartDate(value){
  if(isRerendering) return; // blur מלאכותי שנגרם מהרינדור עצמו - לא פעולת יציאה אמיתית
  const c = currentCase();
  c.startDate = value;
  if(value) delete ui.errors["f101_startDate"];
  else ui.errors["f101_startDate"] = "שדה חובה.";
  render();
}
/* חבר/ת קיבוץ מוצג כשתי שאלות רדיו נפרדות (עיקרית כן/לא, ותת-שאלה
   לגבי העברת ההכנסה לקיבוץ), אבל בפועל עדיין נשמר בשדה יחיד
   kibbutzMember עם 3 ערכים אפשריים ("no"/"yes_transferred"/
   "yes_not_transferred") - כדי לא לשנות את מודל הנתונים בשאר הטופס
   (הדפסה, נתוני דוגמה וכו'). כשעוברים מ"לא" ל"כן" בשאלה העיקרית,
   משמרים את התת-בחירה הקודמת אם הייתה כזו, אחרת בוחרים ברירת מחדל. */
function updateKibbutzPrimary(v){
  const c = currentCase();
  if(v==="no"){
    c.employee.kibbutzMember = "no";
  } else if(c.employee.kibbutzMember!=="yes_transferred" && c.employee.kibbutzMember!=="yes_not_transferred"){
    c.employee.kibbutzMember = "yes_transferred";
  }
  render();
}
/* אני מבקש/ת תיאום מס (חלק ט') - כשמסמנים checkbox נפתחת שאלת סיבת הבקשה
   ושלושת האפשרויות. כשמבטלים סימון, מאפסים את הבחירה ואת מקורות ההכנסה
   שהוזנו כדי לא להשאיר נתונים לא רלוונטיים. */
function toggleTaxCoordRequested(checked){
  const c = currentCase();
  c.employee.taxCoordination.requested = checked;
  if(!checked){
    c.employee.taxCoordination.option = "";
    c.employee.taxCoordination.sources = [];
  }
  render();
}
function scrollToField(id){
  const el = document.getElementById(id) || document.getElementById(id+"_wrap");
  if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); if(el.focus) el.focus(); }
}

/* עטיפת שדה עם תווית, כוכבית חובה, סימן שאלה אופציונלי, והודעת שגיאה */

}
const IDNUM_TOOLTIP = "אין צורך להכניס אפסים בתחילת המספר והם לא ישמרו.";
/* אייקון אזהרה (משולש צהוב עם סימן קריאה שחור) המוצג לפני שורות

/* ============================================================
   9-ב. וולידציית טופס 101
   ============================================================ */
function validateForm101(c){
  const emp = c.employee, errs = {};
  if(!c.startDate) errs["f101_startDate"]="שדה חובה.";
  // שם, סוג זיהוי ומספר זהות/דרכון מאומתים בעת פתיחת התיק (ר' validateNewCase)
  // ומוצגים כאן לקריאה בלבד - אין צורך לאמת אותם שוב במסך זה.
  if(!emp.birthDate) errs["f101_birthDate"]="שדה חובה.";
  else if(emp.birthDate > todayIso()) errs["f101_birthDate"]="תאריך לידה אינו יכול להיות עתידי.";
  if(!emp.gender) errs["f101_gender"]="שדה חובה.";
  if(!emp.maritalStatus) errs["f101_maritalStatus"]="שדה חובה.";
  if(!emp.isIsraeliResident) errs["f101_isIsraeliResident"]="שדה חובה.";
  if(!emp.healthFundMember) errs["f101_healthFundMember"]="שדה חובה.";
  else if(emp.healthFundMember==="yes" && !emp.healthFundName) errs["f101_healthFundName"]="שדה חובה כאשר חבר/ה בקופת חולים.";
  const p1ok = emp.mobilePhone && validPhone(emp.mobilePhone);
  const p2ok = emp.phone2 && validPhone(emp.phone2);
  if(!p1ok && !p2ok) errs["f101_mobilePhone"]="יש למלא לפחות מספר טלפון אחד תקין (לדוגמה: 050-1234567).";
  if(!emp.email||!emp.email.trim()) errs["f101_email"]="שדה חובה.";
  else if(!validEmail(emp.email)) errs["f101_email"]="כתובת דוא\"ל אינה תקינה.";
  if(!emp.street||!emp.street.trim()) errs["f101_street"]="שדה חובה.";
  if(!emp.houseNumber||!String(emp.houseNumber).trim()) errs["f101_houseNumber"]="שדה חובה.";
  if(!emp.city||!emp.city.trim()) errs["f101_city"]="שדה חובה.";
  if(!emp.incomeType) errs["f101_incomeType"]="שדה חובה — יש לבחור סוג הכנסה אחד ממעסיק זה.";
  if(!emp.otherIncome.has) errs["f101_otherIncomeHas"]="שדה חובה.";
  else if(emp.otherIncome.has==="yes"){
    if(!emp.otherIncome.types||!emp.otherIncome.types.length) errs["f101_otherIncomeTypes"]="יש לסמן לפחות סוג הכנסה אחד.";
    if(!emp.otherIncome.creditPointsLocation) errs["f101_creditPointsLoc"]="שדה חובה.";
    if(!emp.otherIncome.noHishtalmutDeposits || !emp.otherIncome.noPensionDeposits) errs["f101_otherIncomeDeposits"]="שדה חובה.";
  }

  if(emp.maritalStatus==="married"){
    const sp = emp.spouse;
    if(!sp.firstName||!sp.firstName.trim()) errs["f101_spouse_firstName"]="שדה חובה.";
    if(!sp.lastName||!sp.lastName.trim()) errs["f101_spouse_lastName"]="שדה חובה.";
    if(sp.idType==="id"){
      if(!sp.idNumber) errs["f101_spouse_idNumber"]="שדה חובה.";
      else if(!validIsraeliId(sp.idNumber)) errs["f101_spouse_idNumber"]="מספר זהות אינו תקין.";
    } else {
      if(!sp.passportNumber) errs["f101_spouse_passportNumber"]="שדה חובה.";
    }
    if(!sp.birthDate) errs["f101_spouse_birthDate"]="שדה חובה.";
    if(!sp.incomeStatus) errs["f101_spouse_incomeStatus"]="שדה חובה.";
  }

  emp.children.forEach((kid,idx)=>{
    if(!kid.name||!kid.name.trim()) errs["f101_kid_"+idx+"_name"]="שדה חובה.";
    if(!kid.idNumber) errs["f101_kid_"+idx+"_idNumber"]="שדה חובה.";
    else if(!validIsraeliId(kid.idNumber)) errs["f101_kid_"+idx+"_idNumber"]="מספר זהות אינו תקין.";
    if(!kid.birthDate) errs["f101_kid_"+idx+"_birthDate"]="שדה חובה.";
  });

  const tc = emp.taxCredits;
  if(tc.c3.checked){
    if(!tc.c3.fromDate) errs["f101_c3_fromDate"]="שדה חובה.";
    if(!tc.c3.settlement||!tc.c3.settlement.trim()) errs["f101_c3_settlement"]="שדה חובה.";
  }
  if(tc.c4.checked){
    if(!tc.c4.fromDate) errs["f101_c4_fromDate"]="שדה חובה.";
  }
  if(tc.c7.checked){
    ["bornThisYear","age1to2","age3","age4to5","age6to17","age18"].forEach(f=>{
      if(tc.c7[f]===""||tc.c7[f]===null||tc.c7[f]===undefined) errs["f101_c7_"+f]="שדה חובה.";
    });
  }
  if(tc.c8.checked){
    ["bornThisYear","age1to2","age3","age4to5","age6to17"].forEach(f=>{
      if(tc.c8[f]===""||tc.c8[f]===null||tc.c8[f]===undefined) errs["f101_c8_"+f]="שדה חובה.";
    });
  }
  if(tc.c11.checked){
    if(tc.c11.count===""||tc.c11.count===null||tc.c11.count===undefined) errs["f101_c11_count"]="שדה חובה.";
    else if(Number(tc.c11.count)<=0) errs["f101_c11_count"]="יש להזין מספר גדול מ-0.";
    else if(Number(tc.c11.count)>emp.children.length) errs["f101_c11_count"]="המספר לא יכול להיות גבוה ממספר הילדים שהוזנו בחלק ג'.";
  }
  if(tc.c14.checked){
    if(!tc.c14.startDate) errs["f101_c14_startDate"]="שדה חובה.";
    if(!tc.c14.endDate) errs["f101_c14_endDate"]="שדה חובה.";
    else if(tc.c14.startDate && tc.c14.endDate < tc.c14.startDate) errs["f101_c14_endDate"]="תאריך סיום לא יכול להיות לפני תאריך תחילה.";
  }
  if(tc.c16.checked){
    if(tc.c16.days===""||tc.c16.days===null||tc.c16.days===undefined) errs["f101_c16_days"]="שדה חובה.";
    else if(Number(tc.c16.days)<=0) errs["f101_c16_days"]="יש להזין מספר ימים גדול מ-0.";
  }

  if(emp.taxCoordination.requested && !emp.taxCoordination.option) errs["f101_taxCoordOption"]="שדה חובה.";
  if(emp.taxCoordination.option==="hasOtherIncome"){
    if(!emp.taxCoordination.sources.length) errs["f101_taxCoordSources"]="יש להוסיף לפחות מקור הכנסה אחד.";
    emp.taxCoordination.sources.forEach((s,idx)=>{
      if(!s.employerName) errs["f101_ts_"+idx+"_employerName"]="שדה חובה.";
      if(!s.address) errs["f101_ts_"+idx+"_address"]="שדה חובה.";
      if(!s.taxFileNum) errs["f101_ts_"+idx+"_taxFileNum"]="שדה חובה.";
      if(!s.incomeType) errs["f101_ts_"+idx+"_incomeType"]="שדה חובה.";
      if(s.monthlyIncome===""||s.monthlyIncome===undefined||s.monthlyIncome===null) errs["f101_ts_"+idx+"_monthlyIncome"]="שדה חובה.";
      if(s.taxWithheld===""||s.taxWithheld===undefined||s.taxWithheld===null) errs["f101_ts_"+idx+"_taxWithheld"]="שדה חובה.";
    });
  }

  if(!emp.declarationAccepted) errs["f101_declaration"]="יש לאשר את ההצהרה כדי לסיים.";
  return errs;
}

  const errs = validateForm101(c);

}

/* רץ תוך כדי הקלדה (oninput): מעדכן ערך בלבד. לשדות אלו (מספר/תאריך)
   אין כלל פורמט חי רלוונטי (הדפדפן עצמו מגביל לספרות בשדה number),
   ולכן שגיאת שלמות/טווח קודמת (אם הייתה) נמחקת מיד עם תחילת העריכה,
   ותופיע שוב רק ב-blur - ראו finalizeCreditField. */
function updateCreditField(key,field,value){
  const c = currentCase();
  const tc = c.employee.taxCredits;
  tc[key][field]=value;
  delete ui.errors["f101_"+key+"_"+field];
  render();
}
/* רץ ביציאה מהשדה (onblur) או בשליחת הטופס: מריץ את בדיקות השלמות/טווח
   הקיימות (ללא שינוי בכללים עצמם) - זהה למה שהיה קודם ב-updateCreditField. */
function finalizeCreditField(key,field,value){
  if(isRerendering) return; // blur מלאכותי שנגרם מהרינדור עצמו (ר' isRerendering) - לא פעולת יציאה אמיתית
  const c = currentCase();
  const tc = c.employee.taxCredits;
  tc[key][field]=value;
  const errKey = "f101_"+key+"_"+field;
  delete ui.errors[errKey];
  if(key==="c11" && field==="count" && value!==""&&value!==null&&value!==undefined){
    if(Number(value)<=0) ui.errors[errKey]="יש להזין מספר גדול מ-0.";
    else if(Number(value)>c.employee.children.length) ui.errors[errKey]="המספר לא יכול להיות גבוה ממספר הילדים שהוזנו בחלק ג'.";
  }
  if(key==="c16" && field==="days" && value!==""&&value!==null&&value!==undefined){
    if(Number(value)<=0) ui.errors[errKey]="יש להזין מספר ימים גדול מ-0.";
  }
  if(key==="c14" && (field==="startDate"||field==="endDate")){
    delete ui.errors["f101_c14_endDate"];
    if(tc.c14.startDate && tc.c14.endDate && tc.c14.endDate < tc.c14.startDate){
      ui.errors["f101_c14_endDate"] = "תאריך סיום לא יכול להיות לפני תאריך תחילה.";
    }
  }
  render();
}
function ageEligible1618(birthIso,taxYear){
  if(!birthIso) return false;
  const y = new Date(birthIso).getFullYear();
  const ageAtYearEnd = taxYear - y;
  return ageAtYearEnd>=16 && ageAtYearEnd<18;
}

/* ============================================================
   9. מסך בית לתיק (HR) — צ'ק ליסט הטפסים (תצוגה בלבד) + כפתור פעולה יחיד
   ============================================================ */
/* mode:"actions" - טאב מילוי הטפסים (עובד/ת): כפתור התחלה/עריכה לכל שורה.
   mode:"view" - כרטיס עובד (HR, תצוגה בלבד): אין אפשרות לערוך, אבל לטופס
   שכבר הושלם מוצג כפתור "לצפייה והדפסה" שפותח את תצוגת ההדפסה שלו. */
function checklistRowsHtml(items, mode){
  return items.map(it=>{
    let badge, action = '';
    if(mode==="actions"){
      // מסך מילוי הטפסים (עובד/ת): אייקון תיבת סימון במקום תגית טקסט.
      badge = '<span title="'+(it.completed?"הושלם":"לא הושלם")+'">'+checklistCheckIcon(it.completed)+'</span>';
      action = '<button class="btn '+(it.completed?"btn-secondary":"btn-emp-start")+'" onclick="openChecklistItem(\''+it.key+'\')">'+(it.completed?"עריכה":"התחלה")+'</button>';
    } else {
      // כרטיס עובד (HR, תצוגה בלבד) - נשאר ללא שינוי: תגית טקסט + כפתור הדפסה לטופס שהושלם.
      badge = it.completed
        ? '<span class="status-pill pill-green">הושלם</span>'
        : '<span class="status-pill pill-yellow">לא הושלם</span>';
      if(it.completed) action = '<button class="checklist-print-btn" onclick="viewCompletedChecklistItem(\''+it.key+'\')" title="לצפייה והדפסה">'+ICON_SVGS.printer+'<span>הדפסה</span></button>';
    }
    return '<div class="checklist-row">' +
      '<span style="font-weight:700;">'+escapeHtml(it.label)+'</span>' +
      '<span class="checklist-status-col">'+badge+'</span>' +
      '<span class="checklist-action-col">'+action+'</span>' +
    '</div>';
  }).join("");
}
function progressRingSvg(done,total,size,ringColor,textColor){
  size = size||76;
  ringColor = ringColor||"#2FA745";
  textColor = textColor||"#195E7B";
  const r = size/2 - 6, c = size/2, circumference = 2*Math.PI*r;
  const pct = total? done/total : 0;
  const offset = circumference*(1-pct);
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#EEF1F3" stroke-width="9"></circle>' +
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+ringColor+'" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+circumference.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'" transform="rotate(-90 '+c+' '+c+')"></circle>' +
    '<text x="'+c+'" y="'+(c+6)+'" text-anchor="middle" font-size="17" font-weight="700" fill="'+textColor+'">'+Math.round(pct*100)+'%</text>' +
  '</svg>';
}
/* אייקון תיבת סימון (משמש רק במסך מילוי הטפסים של העובד/ת - ר'
   checklistRowsHtml עם mode==="actions") - ירוק מסומן / אפור ריק,
   במקום תגית טקסט "הושלם"/"לא הושלם". */
function checklistCheckIcon(checked){
  if(checked){
    return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" fill="#fff" stroke="#2FA745" stroke-width="2"/><path d="M7 12.5l3 3 7-7" stroke="#2FA745" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
  }
  return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="#D9DEE3" stroke-width="2"/></svg>';
}

function updateEmailAccessDate(val){
  const c = currentCase();
  if(!c) return;
  if(!c.checklistData) c.checklistData = {};
  if(!c.checklistData.emailAccess) c.checklistData.emailAccess = {date:""};
  c.checklistData.emailAccess.date = val;
  render();
}
function finishEmailAccessForm(){
  const c = currentCase();
  if(!c) return;
  const dateVal = c.checklistData && c.checklistData.emailAccess && c.checklistData.emailAccess.date;
  if(!dateVal){
    showToast("יש להזין תאריך לפני סיום.");
    return;
  }
  c.checklist.emailAccess = true;
  showToast('הטופס "אישור על כניסה לתיבת דוא"ל" סומן כהושלם.');
  ui.screen = "checklist";
  render();
}

function toggleOtherIncomeType(id,checked){
  const c = currentCase();
  const arr = c.employee.otherIncome.types;
  const i = arr.indexOf(id);
  if(checked && i===-1) arr.push(id);
  if(!checked && i>-1) arr.splice(i,1);
  render();
}

   11. טופס פרטי חשבון בנק

function updateBank(path,value){
  const c = currentCase();
  setPath(c.bank,path,value);
  // כלל עסקי: אם משתמש/ת מחליפ/ה בנק לאחר שכבר נבחר סניף, יש לנקות מיד
  // את בחירת הסניף הקודמת (השדה חוזר להיות ריק) - כי רשימת הסניפים
  // תלויה בבנק שנבחר, ואין להשאיר קוד סניף שלא שייך לבנק החדש.
  // המשתמש/ת חייב/ת לבחור מחדש סניף מתוך רשימת הסניפים של הבנק החדש.
  if(path==="bankCode") c.bank.branchCode="";
  ui.bankFormDirty = true;
  render();
}
/* --- ניווט חזרה לתיק הקליטה מתוך טופס הבנק, עם בדיקת שינויים שלא נשמרו --- */
function attemptLeaveBankForm(){
  const c = currentCase();
  if(!c) return;
  if(ui.bankFormDirty){
    ui.showBankLeaveModal = true;
    render();
  } else {
    backToFormsHome();
  }
}
function saveBankDraftAndLeave(){
  ui.showBankLeaveModal = false;
  ui.bankFormDirty = false;
  showToast("הטיוטה נשמרה.");
  backToFormsHome();
}
function leaveBankFormWithoutSaving(){
  const c = currentCase();
  // ביטול השינויים שבוצעו מאז כניסה למסך - שחזור הנתונים למצב שהיה בעת
  // הכניסה לטופס (ui.bankFormSnapshot), כפי שסוכם בכלל אי-שמירת השינויים.
  if(c && ui.bankFormSnapshot){
    try{ c.bank = JSON.parse(ui.bankFormSnapshot); }catch(e){}
  }
  ui.showBankLeaveModal = false;
  ui.bankFormDirty = false;
  backToFormsHome();
}
function stayInBankForm(){

}

/* --- שדה בנק/סניף: רשימה נפתחת אחת שניתן גם להקליד בתוכה (ללא שדה חיפוש נפרד) ---
   רכיב combobox נגיש (ARIA) עם תמיכה מלאה במקלדת בנוסף לבחירה בעכבר:
   חץ למטה/למעלה לניווט בין האפשרויות המסוננות, Enter לבחירה, Escape
   לסגירת הרשימה בלי לשנות ערך, Tab למעבר לשדה הבא בלי בחירה אוטומטית.
   מצב הניווט (הרשימה המסוננת הנוכחית והאפשרות המודגשת) נשמר ב-comboNav,
   מחוץ ל-render() הראשי, כדי לא לאבד פוקוס/סמן בכל הקלדה. --- */
const comboNav = { bank:{list:[],activeIndex:-1}, branch:{list:[],activeIndex:-1} };
function comboFieldId(kind){ return kind==="bank" ? "bank_bankCode" : "bank_branchCode"; }
function comboSetList(kind,query){
  const c = currentCase();
  const list = kind==="bank"
    ? BankBranchesService.listBanks(query)
    : (c.bank.bankCode ? BankBranchesService.listBranches(c.bank.bankCode,query) : []);
  comboNav[kind].list = list;
  comboNav[kind].activeIndex = -1;
  return list;
}
function comboItemsHtml(kind){
  const nav = comboNav[kind];
  if(!nav.list.length) return '<div class="combo-empty">לא נמצאו תוצאות</div>';
  const id = comboFieldId(kind);
  // תצוגה: שורת טקסט רגילה אחת "שם | קוד", ללא תג/רקע נפרד לקוד.
  // קוד הסניף/הבנק (o.code) הוא תמיד מחרוזת טקסט ומוצג כפי שהוא, כולל
  // אפסים מובילים (למשל "027") - ראו הכלל העסקי ליד BANK_BRANCHES_DATA.
  return nav.list.map((o,idx)=>
    '<div class="combo-item'+(idx===nav.activeIndex?" active":"")+'" id="'+id+'_opt_'+idx+'" role="option" aria-selected="'+(idx===nav.activeIndex?"true":"false")+'" onmousedown="comboMouseSelect(\''+kind+'\','+idx+')">'+
      escapeHtml(o.name)+' | '+escapeHtml(o.code)+
    '</div>'
  ).join("");
}
function comboRenderDropdown(kind){
  const dd = document.getElementById(comboFieldId(kind)+"_dd");
  const inp = document.getElementById(comboFieldId(kind));
  if(!dd) return;
  dd.innerHTML = comboItemsHtml(kind);
  if(inp){
    const nav = comboNav[kind];
    if(nav.activeIndex>=0 && nav.list[nav.activeIndex]) inp.setAttribute("aria-activedescendant",comboFieldId(kind)+"_opt_"+nav.activeIndex);
    else inp.removeAttribute("aria-activedescendant");
  }
}
function comboScrollActiveIntoView(kind){
  const nav = comboNav[kind];
  if(nav.activeIndex<0) return;
  const el = document.getElementById(comboFieldId(kind)+"_opt_"+nav.activeIndex);
  if(el && el.scrollIntoView) el.scrollIntoView({block:"nearest"});
}
function comboOpenDropdown(kind){
  const dd = document.getElementById(comboFieldId(kind)+"_dd");
  const inp = document.getElementById(comboFieldId(kind));
  if(dd) dd.classList.add("open");
  if(inp) inp.setAttribute("aria-expanded","true");
}
function comboCloseDropdown(kind){
  const dd = document.getElementById(comboFieldId(kind)+"_dd");
  const inp = document.getElementById(comboFieldId(kind));
  if(dd) dd.classList.remove("open");
  comboNav[kind].activeIndex = -1;
  if(inp){ inp.setAttribute("aria-expanded","false"); inp.removeAttribute("aria-activedescendant"); }
}
function comboFocus(kind){
  const dd = document.getElementById(comboFieldId(kind)+"_dd");
  const inp = document.getElementById(comboFieldId(kind));
  if(!dd || !inp) return;
  comboSetList(kind,"");
  comboOpenDropdown(kind);
  comboRenderDropdown(kind);
}

/* בחירת ערך (מקלדת Enter או קליק עכבר) - סוגרת את הרשימה, שומרת את הקוד
   כמחרוזת טקסט במודל, ומרעננת את התצוגה. אם נבחר בנק, השדה סניף נפתח
   ומקבל פוקוס אוטומטית (כלל 8), כדי לאפשר המשך בחירה במקלדת ללא עכבר. */
function comboCommit(kind,code){
  comboCloseDropdown(kind);
  updateBank(kind==="bank"?"bankCode":"branchCode",code);
  if(kind==="bank"){
    setTimeout(()=>{
      const branchInput = document.getElementById(comboFieldId("branch"));
      if(branchInput){ branchInput.focus(); comboFocus("branch"); }
    },60);
  }
}
function comboBlur(kind){
  setTimeout(()=>{
    comboCloseDropdown(kind);
    const c = currentCase();
    const inp = document.getElementById(comboFieldId(kind));
    if(!c || !inp) return;
    const code = kind==="bank" ? c.bank.bankCode : c.bank.branchCode;
    const expected = code ? (kind==="bank" ? bankName(code) : branchName(c.bank.bankCode,code))+" | "+code : "";
    if(inp.value !== expected) render();
  },150);
}
/* Escape: סוגר את הרשימה ומחזיר את הטקסט המוצג לערך השמור במודל,
   בלי לשנות את הערך ובלי לבחור אפשרות (כלל 5). */
function comboResetDisplay(kind){
  const c = currentCase();
  const inp = document.getElementById(comboFieldId(kind));
  if(!c || !inp) return;
  const code = kind==="bank" ? c.bank.bankCode : c.bank.branchCode;
  const expected = code ? (kind==="bank" ? bankName(code) : branchName(c.bank.bankCode,code))+" | "+code : "";
  inp.value = expected;
}
/* מחזיר את שאילתת הסינון האפקטיבית: אם הטקסט בשדה עדיין זהה לערך השמור
   (המשתמש לא הקליד דבר חדש מאז הבחירה האחרונה) - מחזיר מחרוזת ריקה,
   כדי שהרשימה המלאה תוצג ("אם לא הוקלד טקסט, יש לסמן את האפשרות הראשונה
   ברשימה" - כלל 7). אחרת מחזיר את מה שהמשתמש הקליד בפועל. */
function comboEffectiveQuery(kind,inp){
  const c = currentCase();
  if(!c || !inp) return "";
  const code = kind==="bank" ? c.bank.bankCode : c.bank.branchCode;
  const label = code ? (kind==="bank" ? bankName(code) : branchName(c.bank.bankCode,code))+" | "+code : "";
  return inp.value===label ? "" : inp.value;
}
function comboKeyDown(e,kind){
  const dd = document.getElementById(comboFieldId(kind)+"_dd");
  const inp = document.getElementById(comboFieldId(kind));
  const nav = comboNav[kind];
  const isOpen = !!(dd && dd.classList.contains("open"));
  if(e.key==="ArrowDown"){
    e.preventDefault();
    if(!isOpen){
      // כלל 7: אם הרשימה סגורה, פתח אותה וסמן את האפשרות הראשונה
      // המתאימה לטקסט שהוקלד (או הראשונה ברשימה אם לא הוקלד טקסט).
      comboSetList(kind, comboEffectiveQuery(kind,inp));
      comboOpenDropdown(kind);
      nav.activeIndex = nav.list.length ? 0 : -1;
    } else if(nav.list.length){
      nav.activeIndex = nav.activeIndex < nav.list.length-1 ? nav.activeIndex+1 : nav.list.length-1;
    }
    comboRenderDropdown(kind);
    comboScrollActiveIntoView(kind);
  } else if(e.key==="ArrowUp"){
    e.preventDefault();
    if(isOpen && nav.list.length){
      nav.activeIndex = nav.activeIndex>0 ? nav.activeIndex-1 : 0;
      comboRenderDropdown(kind);
      comboScrollActiveIntoView(kind);
    }
  } else if(e.key==="Enter"){
    if(isOpen && nav.activeIndex>=0 && nav.list[nav.activeIndex]){
      e.preventDefault();
      comboCommit(kind,nav.list[nav.activeIndex].code);
    }
  } else if(e.key==="Escape"){
    if(isOpen){
      e.preventDefault();
      comboCloseDropdown(kind);
      comboResetDisplay(kind);
    }
  } else if(e.key==="Tab"){
    if(isOpen) comboCloseDropdown(kind);
    // לא מבצעים preventDefault - הפוקוס עובר כרגיל לשדה הבא, בלי בחירה אוטומטית (כלל 6).
  }
}

        ' oninput="comboFilter(\''+kind+'\',this.value)" onfocus="comboFocus(\''+kind+'\')" onblur="comboBlur(\''+kind+'\')" onkeydown="comboKeyDown(event,\''+kind+'\')">' +

function validateBankForm(c){

/* מזהה חדש עבור רשומת קוד (חברה/אתר עבודה) בהמשך לתבנית המזהים הקיימת
   בנתוני הדמה (c1..c6) - סורק את המזהים הקיימים עם אותה קידומת ומחזיר
   את המספר הבא הפנוי, כדי לא להתנגש בהם. */
function nextCodeId(prefix, arr){
  let max = 0;
  arr.forEach(x=>{
    const m = /^([A-Za-z]+)(\d+)$/.exec(x.id||"");
    if(m && m[1]===prefix){ const n = parseInt(m[2],10); if(n>max) max = n; }
  });
  return prefix + (max+1);
}
